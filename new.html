<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    button{
      background-color: blue;
      border-radius: 25px;
      margin: 10px;
      padding: 20px;
      border: 5px solid brown;
      height: 150px;
      width: 250px;
    
    }
    .btn-box {
      text-align: center;
    }
    button:hover {
      background-color: whitesmoke;
    }
    img{
      border-radius: 15px;
      height: 170px;
      width: 300px;

    }
    .image-box {
      text-align: center;
    }
    
    
    img:hover{
  transform: scale(1.1);
  
}
  
  </style>
</head>
<body>
<div class="btn-box">
  <button>CLICK NOW</button>
</div>
  <div class="image-box">
  <img src="Wallpaper.jpg" alt="pic">
  </div>
</body>
</html>
