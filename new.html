<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    button{
      background-color: rgb(255, 0, 0);
      border-radius: 25px;
      margin: 10px;
      padding: 20px;
      height: 100px;
      width: 200px;
      transition:background 0.5s ease;
    }
     
    .btn-box {
      text-align: center;
      
    }
    button:hover {
      background-color: rgb(255, 159, 159);
       transform: scale(1.1);
    }
  input:focus{
  border: 2px solid blue;
  outline: none;

  }
  p::first-letter{
    color: rgb(254, 1, 1);
    font-size: 40px;
    font-style: oblique;
  }
  </style>
</head>
<body>
<div class="btn-box">
  <button>CLICK NOW</button>
</div>
<input type="text" placeholder="entername">
<p>
  This week upgrades students from basic page builders <br> to modern UI engineers.The focus <br>is on advanced CSS selectors, responsive design,<br> CSS Grid, transitions, animations, Tailwind CSS,<br> and real-world clone thinking.

</p>
</body>
</html>
