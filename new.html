<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,
   initial-scale=1.0">
  <title>Practice</title>
  <style>
    button{
      background-color: rgb(255, 0, 0);
      border-radius: 50px;
      font-size: 20px;
      color: whitesmoke;
      font-family: cursive;
      margin: 10px;
      padding: 20px;
      height: 80px;
      width: 200px;
      transition: all 0.5s ease;
    }
     
    .btn-box {
      text-align: center;
  
      
    }
    button:hover {
      background-color: rgb(255, 159, 159);
       transform: scale(1.1);
    }
  input:focus{
  border: 2px solid blue;
  outline: none;

  }
  p::first-letter{
    color: rgb(254, 1, 1);
    font-size: 40px;
    font-style: oblique;
    font-size: medium;
  }
  .container{
    display: grid;
    gap: 20px;
    background-color:  lightpink;
  padding: 20px;
  grid-template-columns: 200px 200px 200px 200px 200px;
  grid-template-rows: 200px 200px;
  }
  .box{
background-color:  lightgray;
color: rgb(255, 28, 28);
font-size: 20px;
border-radius: 8px;
padding: 30px;
                                                                             

  }
  </style>
</head>
<body>
  <img src="box.jpg" alt="image">
<div class="btn-box">
  <button>Click Me</button>
</div>
<input type="text" placeholder="entername">

<p>
  This week upgrades students from basic page builders <br> to modern UI engineers.
</p>

<div class="container">

<div class="box">Box 1</div>
<div class="box">Box 2</div>
<div class="box">Box 3</div>
<div class="box">Box 4</div>
<div class="box">Box 5</div>
<div class="box">Box 6</div>
<div class="box">Box 7</div>
<div class="box">Box 8</div>
<div class="box">Box 9</div>
<div class="box">Box 10</div>


</div>
  <footer>
    @nihala nasreen as
  </footer>
</body>
</html>
